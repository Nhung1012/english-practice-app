<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<title>Luyện Nghe & Đọc Tiếng Anh</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%90%B1</text></svg>">
<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --highlight: #fef08a;
    --green: #16a34a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }
  header {
    text-align: center;
    margin-bottom: 24px;
  }
  header h1 {
    font-size: 24px;
    margin: 0 0 4px;
  }
  header p {
    color: var(--muted);
    margin: 0;
    font-size: 14px;
  }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    background: var(--card);
    padding: 6px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: 0.15s;

  .tab-btn.active {
    background: var(--primary);
    color: white;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;

  .row-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .level-group {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .level-btn {
    flex: 1;
    padding: 10px 6px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--muted);
    transition: 0.15s;
  }
  .level-btn.active {
    border-color: var(--primary);
    background: #eff6ff;
    color: var(--primary);
  }
  .topic-display {
    display: flex;

  .topic-display span {

    font-size: 15px;
  }
  .topic-select-row {

  }
  .topic-select-row select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    font-size: 14px;
    background: white;
    color: var(--text);
  }
  .btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.15s;
  }
  .btn:hover { background: var(--primary-dark); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-icon {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn.secondary {
    background: white;
    border: 1.5px solid var(--border);
    color: var(--text);
  }
  .btn.secondary:hover { background: #f1f5f9; }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .script-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .script-header .row-label {
    margin-bottom: 0;
  }
  .copy-btn {
    padding: 6px 12px;
    font-size: 13px;
  }
  .copy-btn.copied {
    background: #dcfce7;
    border-color: var(--green);
    color: var(--green);
  }
  .script-box {
    line-height: 2;
    font-size: 16px;
    min-height: 60px;
  }
  .line {
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 6px;
    transition: background 0.2s;
  }
  .line.active {
    background: var(--highlight);
  }
  .speaker-a { color: var(--primary); font-weight: 700; }
  .speaker-b { color: #dc2626; font-weight: 700; }
  .listen-line { }
  .status {
    font-size: 13px;
    color: var(--muted);
    margin-top: 10px;
    text-align: center;
  }
  .status.error {
    color: #dc2626;
  }
  .badge {
    display: inline-block;
    background: #dbeafe;
    color: var(--primary);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 999px;
    margin-left: 8px;
  }
  .source-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 8px;
  }
  .source-badge.live { background: #dcfce7; color: var(--green); }
  .source-badge.offline { background: #fee2e2; color: #dc2626; }
</style>

<body>
<div class="container">
  <header>
    <h1>🎧 Luyện Nghe &amp; Đọc Tiếng Anh</h1>
    <p>Chọn trình độ, random chủ đề, luyện nghe/đọc mỗi ngày</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="dialogue">💬 Hội thoại 2 người</button>
    <button class="tab-btn" data-tab="listening">🎙️ Luyện nghe (script)</button>
  </div>

  <!-- LEVEL SELECT (shared) -->
  <div class="card">
    <div class="row-label">Trình độ</div>
    <div class="level-group" id="levelGroup">
      <button class="level-btn active" data-level="beginner">🟢 Cơ bản (A1-A2)</button>
      <button class="level-btn" data-level="intermediate">🟡 Trung cấp (B1-B2)</button>
      <button class="level-btn" data-level="advanced">🔴 Nâng cao (C1-C2)</button>
    </div>

    <div class="row-label">Chủ đề hôm nay</div>
    <div class="topic-display">
      <span id="topicText">—</span>
      <button class="btn secondary" id="randomBtn">🔀 Đổi chủ đề</button>
    </div>

    <div class="topic-select-row">
      <select id="topicSelect">
        <option value="">-- Hoặc chọn chủ đề có sẵn --</option>
      </select>

    <div class="controls">
      <button class="btn" id="playBtn"><span class="btn-icon">▶️ Nghe</span></button>

  <!-- SCRIPT DISPLAY -->
  <div class="card">
    <div class="script-header">
      <div class="row-label" id="scriptLabel">Nội dung</div>
      <button class="btn secondary copy-btn" id="copyBtn">📋 Copy</button>
    </div>
    <div class="script-box" id="scriptBox"></div>
  </div>
</div>

<!-- supabase-js qua CDN, không cần build tool -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ====== CẤU HÌNH SUPABASE ======
// URL và anon key đều là thông tin CÔNG KHAI, an toàn để để trong frontend
// vì bảng "content" chỉ cho phép SELECT (xem supabase_schema.sql, policy
// "Public read access"). KHÔNG bao giờ đặt service_role key ở đây.
const SUPABASE_URL = "https://jlczlapfhqvfiktcpdwf.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_KAmDWtIWM3CzA8xrDRu19A_5Xtf0A1u";

const supabaseClient = (SUPABASE_URL.includes("YOUR-PROJECT-REF") || !window.supabase)
  ? null
  : window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ====== DỮ LIỆU DỰ PHÒNG (fallback) ======
// Dùng khi chưa cấu hình Supabase, mất mạng, hoặc project Supabase free
// tier đang bị pause. Giữ nguyên bộ mẫu demo ban đầu để app luôn chạy được.
const FALLBACK_DIALOGUES = {
  beginner: [
    { topic: "Đặt bàn nhà hàng", lines: [
      {s:"A", t:"Hello! Do you have a table for two?"},
      {s:"B", t:"Yes, we do. Do you want a table by the window?"},
      {s:"A", t:"Yes, please. That sounds nice."},
      {s:"B", t:"No problem. Please follow me. Here is the menu."},
      {s:"A", t:"Thank you. Can I have a few minutes to look at it?"},
      {s:"B", t:"Sure, take your time."}
    ]}
  ],
  intermediate: [
    { topic: "Phỏng vấn xin việc", lines: [
      {s:"A", t:"Thank you for coming in today. Can you tell me about your previous experience?"},
      {s:"B", t:"Of course. I worked as a marketing assistant for two years."},
      {s:"A", t:"That's great. What do you think is your biggest strength?"},
      {s:"B", t:"I'd say my ability to adapt quickly to new tools and work well under pressure."}
    ]}
  ],
  advanced: [
    { topic: "Tranh luận về biến đổi khí hậu", lines: [
      {s:"A", t:"Some argue that individual actions barely make a dent in climate change compared to corporate emissions."},
      {s:"B", t:"That's true to an extent, but collective behavioral shifts can pressure industries to adapt faster."}
    ]}
  ]
};

const FALLBACK_LISTENING = {
  beginner: [
    { topic: "Một ngày của tôi", text: "I wake up at seven in the morning. First, I brush my teeth and wash my face. Then I eat breakfast with my family." }
  ],
  intermediate: [
    { topic: "Du lịch", text: "Traveling is one of the best ways to learn about different cultures and broaden your perspective on life." }
  ],
  advanced: [
    { topic: "Kinh tế toàn cầu", text: "The global economy has become increasingly interconnected over the past few decades, with supply chains spanning multiple continents." }
  ]
};

// ====== STATE ======
let currentTab = "dialogue";
let currentLevel = "beginner";
let currentItem = null;
let usingFallback = false;

// "Phiên đọc" hiện tại. Một số trình duyệt (đặc biệt Chrome) vẫn bắn ra
// sự kiện onend/onerror của câu đang đọc dở dù đã gọi speechSynthesis.cancel()
// khi utterance đang ở trạng thái pause — khiến vòng lặp đọc câu tiếp theo
// (speakNext) tiếp tục chạy ngầm dù người dùng đã đổi chủ đề/trình độ/tab.
// Dùng số phiên tăng dần để speakNext tự huỷ nếu không còn thuộc phiên hiện tại.
let speechSession = 0;

const topicText = document.getElementById('topicText');
const scriptBox = document.getElementById('scriptBox');
const scriptLabel = document.getElementById('scriptLabel');
const statusText = document.getElementById('statusText');
const randomBtn = document.getElementById('randomBtn');
const playBtn = document.getElementById('playBtn');
const topicSelect = document.getElementById('topicSelect');

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function setStatus(msg, isError) {
  statusText.textContent = msg;
  statusText.classList.toggle('error', !!isError);
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, (ch) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}

// ====== GIỌNG ĐỌC NAM (Người A) / NỮ (Người B) ======
// Web Speech API không cho chọn "giới tính" trực tiếp, nên cố gắng tìm 2
// giọng tiếng Anh khác nhau theo tên (từ khoá Male/Female hoặc tên riêng
// quen thuộc của các giọng có sẵn trên Windows/macOS/Chrome). Đồng thời
// luôn chỉnh thêm pitch (cao độ) khác nhau giữa A/B để đảm bảo 2 người luôn
// nghe khác nhau, kể cả khi máy không có sẵn giọng nam/nữ riêng biệt.
let maleVoice = null;
let femaleVoice = null;

function loadVoicesAsync() {
  return new Promise((resolve) => {
    const existing = window.speechSynthesis.getVoices();
    if (existing.length) { resolve(existing); return; }
    window.speechSynthesis.onvoiceschanged = () => {
      resolve(window.speechSynthesis.getVoices());
    };
    // Phòng khi trình duyệt không bắn sự kiện voiceschanged
    setTimeout(() => resolve(window.speechSynthesis.getVoices()), 1500);
  });
}

async function initVoices() {
  const voices = await loadVoicesAsync();
  const enVoices = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith('en'));
  const pool = enVoices.length ? enVoices : voices;
  if (!pool.length) return;

  const maleKeywords = ['male', 'man', 'david', 'mark', 'daniel', 'guy', 'fred', 'alex', 'tom', 'james'];
  const femaleKeywords = ['female', 'woman', 'zira', 'samantha', 'susan', 'victoria', 'karen', 'moira', 'tessa', 'fiona'];

  maleVoice = pool.find(v => maleKeywords.some(k => v.name.toLowerCase().includes(k))) || null;
  femaleVoice = pool.find(v => v !== maleVoice && femaleKeywords.some(k => v.name.toLowerCase().includes(k))) || null;

  // Không tìm được giọng khớp tên (nhiều máy chỉ có 1-2 giọng không rõ giới
  // tính) → lấy tạm 2 giọng khác nhau trong danh sách, vẫn phân biệt được
  // A/B nhờ pitch bên dưới.
  if (!maleVoice) maleVoice = pool[0];
  if (!femaleVoice) femaleVoice = pool.find(v => v !== maleVoice) || pool[0];
}
initVoices();

function getSpeakerVoiceSettings(speaker) {
  if (speaker === 'A') return { voice: maleVoice, pitch: 0.85 };
  if (speaker === 'B') return { voice: femaleVoice, pitch: 1.25 };
  return { voice: null, pitch: 1 };
}

// ====== DANH SÁCH CHỦ ĐỀ ĐỂ CHỌN TRỰC TIẾP ======
// Gộp chủ đề dự phòng (luôn có sẵn) + chủ đề thật từ Supabase (nếu có) theo
// đúng tab + trình độ đang chọn, để người dùng chọn thẳng thay vì chỉ random.
let topicOptions = [];
let topicOptionsSession = 0;

function renderTopicSelect() {
  const options = ['<option value="">-- Hoặc chọn chủ đề có sẵn --</option>'].concat(
    topicOptions.map((opt, i) =>
      `<option value="${i}">${opt.source === 'db' ? '🌐 ' : ''}${escapeHtml(opt.topic)}</option>`
    )
  );
  topicSelect.innerHTML = options.join('');
  syncTopicSelectValue();
}

function syncTopicSelectValue() {
  if (!currentItem) { topicSelect.value = ''; return; }
  const idx = topicOptions.findIndex(opt => opt.topic === currentItem.topic);
  topicSelect.value = idx >= 0 ? String(idx) : '';
}

// Gemini đôi khi sinh trùng tên chủ đề giữa các lần chạy khác ngày (cùng
// type/level), nên danh sách gộp có thể có 2 bản ghi khác id nhưng cùng
// tên chủ đề. Lọc bớt, chỉ giữ lại bản xuất hiện đầu tiên theo tên.
function dedupeByTopic(options) {
  const seen = new Set();
  return options.filter((opt) => {
    if (seen.has(opt.topic)) return false;
    seen.add(opt.topic);
    return true;
  });
}

async function loadTopicOptions() {
  topicOptionsSession++;
  const mySession = topicOptionsSession;

  const localSource = currentTab === 'dialogue'
    ? FALLBACK_DIALOGUES[currentLevel]
    : FALLBACK_LISTENING[currentLevel];
  topicOptions = dedupeByTopic(localSource.map((item, idx) => ({ topic: item.topic, source: 'fallback', fallbackIndex: idx })));
  renderTopicSelect();

  if (!supabaseClient) return;
  try {
    const { data, error } = await supabaseClient
      .from('content')
      .select('id, topic')
      .eq('type', currentTab)
      .eq('level', currentLevel)
      .order('id', { ascending: true });
    // Nếu người dùng đã đổi tab/trình độ khác trong lúc chờ, bỏ qua kết quả này.
    if (mySession !== topicOptionsSession) return;
    if (error || !data) return;
    const dbOptions = data.map(row => ({ topic: row.topic, source: 'db', id: row.id }));
    topicOptions = dedupeByTopic([...dbOptions, ...topicOptions]);
    renderTopicSelect();
  } catch (err) {
    console.warn('Không lấy được danh sách chủ đề từ Supabase:', err);
  }
}

async function loadSelectedTopic(opt) {
  speechSession++;
  window.speechSynthesis.cancel();
  setPlayButton('idle');
  setStatus('Đang tải chủ đề...');

  try {
    let item = null;
    let fromFallback = false;

    if (opt.source === 'fallback') {
      const localSource = currentTab === 'dialogue'
        ? FALLBACK_DIALOGUES[currentLevel]
        : FALLBACK_LISTENING[currentLevel];
      item = localSource[opt.fallbackIndex];
      fromFallback = true;
    } else if (opt.source === 'db' && supabaseClient) {
      const { data, error } = await supabaseClient
        .from('content')
        .select('topic, data')
        .eq('id', opt.id)
        .single();
      if (error || !data) throw error || new Error('Không tìm thấy chủ đề đã chọn');
      item = currentTab === 'dialogue'
        ? { topic: data.topic, lines: data.data.lines }
        : { topic: data.topic, text: data.data.text };
    }

    if (!item) throw new Error('Không tải được chủ đề đã chọn');

    currentItem = item;
    usingFallback = fromFallback;
    topicText.textContent = currentItem.topic;
    renderScript();
    syncTopicSelectValue();
    setStatus(
      usingFallback
        ? 'Nhấn "Nghe" để bắt đầu (đang dùng nội dung dự phòng)'
        : 'Nhấn "Nghe" để bắt đầu'
    );
  } catch (err) {
    console.error('Lỗi khi tải chủ đề đã chọn:', err);
    setStatus('Có lỗi khi tải chủ đề đã chọn, vui lòng thử lại.', true);
  }
}

// Lấy 1 bản ghi ngẫu nhiên từ Supabase qua RPC get_random_content
// (xem hàm trong supabase_schema.sql). Trả về null nếu lỗi/không cấu hình.
async function fetchFromSupabase(type, level) {
  if (!supabaseClient) return null;
  try {
    const { data, error } = await supabaseClient
      .rpc('get_random_content', { p_type: type, p_level: level });
    if (error) throw error;
    if (!data || data.length === 0) return null;
    const row = data[0];
    if (type === 'dialogue') {
      return { topic: row.topic, lines: row.data.lines };
    }
    return { topic: row.topic, text: row.data.text };
  } catch (err) {
    console.warn('Không lấy được dữ liệu từ Supabase, dùng nội dung dự phòng:', err.message || err);
    return null;
  }
}

async function loadNewItem() {
  speechSession++; // vô hiệu hoá mọi vòng lặp speakNext còn sót lại từ chủ đề cũ
  window.speechSynthesis.cancel();
  setPlayButton('idle');
  randomBtn.disabled = true;
  setStatus('Đang tải chủ đề mới...');
  loadTopicOptions(); // làm mới danh sách chủ đề để chọn, chạy song song không cần chờ

  // Ghi nhớ chủ đề đang hiển thị để tránh việc "random" ra đúng chủ đề cũ,
  // vì với data pool nhỏ (vd. fallback chỉ có 1-2 mục) trước đây có thể lặp
  // lại y hệt chủ đề cũ khiến người dùng tưởng nút không hoạt động.
  const previousTopic = currentItem ? currentItem.topic : null;
  const maxAttempts = 3;

  try {
    let newItem = null;
    let newUsingFallback = false;
    const localSource = currentTab === 'dialogue'
      ? FALLBACK_DIALOGUES[currentLevel]
      : FALLBACK_LISTENING[currentLevel];

    for (let attempt = 0; attempt < maxAttempts; attempt++) {
      // Xen kẽ nguồn Supabase / nội dung dự phòng giữa các lần thử: nếu
      // Supabase hiện chỉ có đúng 1 bản ghi cho trình độ này (data còn ít,
      // sẽ tự nhiều lên mỗi ngày), random ở đó mãi vẫn ra cùng 1 chủ đề.
      // Xen thêm nguồn dự phòng (nhiều lựa chọn hơn) để nút "Đổi chủ đề"
      // luôn đổi được, thay vì trông như bị đứng.
      const tryFallbackThisAttempt = attempt % 2 === 1;

      if (!tryFallbackThisAttempt) {
        const fromDb = await fetchFromSupabase(currentTab, currentLevel);
        if (fromDb) {
          newItem = fromDb;
          newUsingFallback = false;
        } else {
          newItem = pickRandom(localSource);
          newUsingFallback = true;
        }
      } else {
        newItem = pickRandom(localSource);
        newUsingFallback = true;
      }

      if (!previousTopic || newItem.topic !== previousTopic) break;
    }

    currentItem = newItem;
    usingFallback = newUsingFallback;

    topicText.textContent = currentItem.topic;
    renderScript();
    syncTopicSelectValue();
    setStatus(
      usingFallback
        ? 'Nhấn "Nghe" để bắt đầu (đang dùng nội dung dự phòng — chưa kết nối được Supabase)'
        : 'Nhấn "Nghe" để bắt đầu'
    );
  } catch (err) {
    console.error('Lỗi khi tải chủ đề mới:', err);
    setStatus('Có lỗi khi tải chủ đề mới, vui lòng thử lại.', true);
  } finally {
    // Luôn bật lại nút dù thành công hay lỗi, tránh việc nút bị kẹt "disabled"
    // khiến người dùng bấm "Đổi chủ đề" mà không thấy phản ứng gì.
    randomBtn.disabled = false;
  }
}

function renderScript() {
  scriptBox.innerHTML = '';
  if (currentTab === 'dialogue') {
    scriptLabel.textContent = 'Hội thoại';
    currentItem.lines.forEach((line, i) => {
      const div = document.createElement('div');
      div.className = 'line';
      div.id = 'line-' + i;
      const speakerLabel = line.s === 'A' ? 'Người A' : 'Người B';
      const speakerClass = line.s === 'A' ? 'speaker-a' : 'speaker-b';
      div.innerHTML = `<span class="${speakerClass}">${speakerLabel}:</span> ${line.t}`;
      scriptBox.appendChild(div);
    });
  } else {
    scriptLabel.textContent = 'Script luyện nghe';
    const sentences = currentItem.text.match(/[^.!?]+[.!?]+/g) || [currentItem.text];
    sentences.forEach((sent, i) => {
      const div = document.createElement('div');
      div.className = 'line listen-line';
      div.id = 'line-' + i;
      div.textContent = sent.trim();
      scriptBox.appendChild(div);
    });
  }
}

function clearHighlight() {
  document.querySelectorAll('.line').forEach(el => el.classList.remove('active'));
}

// Trạng thái nút Nghe: 'idle' (chưa đọc/đã đọc xong) | 'playing' (đang đọc) | 'paused' (đang tạm dừng)
let playState = 'idle';

function setPlayButton(state) {
  playState = state;
  if (state === 'playing') {
    playBtn.innerHTML = '<span class="btn-icon">⏸️ Tạm dừng</span>';
  } else if (state === 'paused') {
    playBtn.innerHTML = '<span class="btn-icon">▶️ Tiếp tục</span>';
  } else {
    playBtn.innerHTML = '<span class="btn-icon">▶️ Nghe</span>';
  }
}

function speakAll() {
  speechSession++;
  const mySession = speechSession;
  window.speechSynthesis.cancel();
  let textsToSpeak = [];

  if (currentTab === 'dialogue') {
    textsToSpeak = currentItem.lines.map(l => l.t);
  } else {
    textsToSpeak = (currentItem.text.match(/[^.!?]+[.!?]+/g) || [currentItem.text]).map(s => s.trim());
  }

  setStatus('Đang đọc...');
  setPlayButton('playing');

  function speakNext(index) {
    // Nếu người dùng đã đổi chủ đề/trình độ/tab (loadNewItem tăng speechSession)
    // trong lúc utterance trước đang phát/tạm dừng, dừng hẳn vòng lặp này lại,
    // không đọc tiếp câu tiếp theo của chủ đề cũ nữa.
    if (mySession !== speechSession) return;
    if (index >= textsToSpeak.length) {
      clearHighlight();
      setStatus('Đã đọc xong. Nhấn "Nghe" để nghe lại.');
      setPlayButton('idle');
      return;
    }
    clearHighlight();
    const lineEl = document.getElementById('line-' + index);
    if (lineEl) {
      lineEl.classList.add('active');
      lineEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    const utter = new SpeechSynthesisUtterance(textsToSpeak[index]);
    utter.lang = 'en-US';
    utter.rate = 1;
    if (currentTab === 'dialogue' && currentItem.lines[index]) {
      const voiceSettings = getSpeakerVoiceSettings(currentItem.lines[index].s);
      if (voiceSettings.voice) utter.voice = voiceSettings.voice;
      utter.pitch = voiceSettings.pitch;
    }
    utter.onend = () => speakNext(index + 1);
    utter.onerror = () => speakNext(index + 1);
    window.speechSynthesis.speak(utter);
  }

  speakNext(0);
}

// ====== EVENTS ======
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    loadNewItem();
  });
});

document.querySelectorAll('.level-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLevel = btn.dataset.level;
    loadNewItem();
  });
});

function getPlainTextContent() {
  if (currentTab === 'dialogue') {
    return currentItem.lines
      .map(line => `${line.s === 'A' ? 'Người A' : 'Người B'}: ${line.t}`)
      .join('\n');
  } else {
    return currentItem.text;
  }
}

document.getElementById('copyBtn').addEventListener('click', async () => {
  const copyBtn = document.getElementById('copyBtn');
  const textToCopy = `Chủ đề: ${currentItem.topic}\n\n${getPlainTextContent()}`;
  try {
    await navigator.clipboard.writeText(textToCopy);
    copyBtn.textContent = '✅ Đã copy!';
    copyBtn.classList.add('copied');
    setTimeout(() => {
      copyBtn.textContent = '📋 Copy';
      copyBtn.classList.remove('copied');
    }, 1500);
  } catch (err) {
    const textarea = document.createElement('textarea');
    textarea.value = textToCopy;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();
    try {
      document.execCommand('copy');
      copyBtn.textContent = '✅ Đã copy!';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = '📋 Copy';
        copyBtn.classList.remove('copied');
      }, 1500);
    } catch (e) {
      copyBtn.textContent = '❌ Lỗi copy';
      setTimeout(() => { copyBtn.textContent = '📋 Copy'; }, 1500);
    }
    document.body.removeChild(textarea);
  }
});

randomBtn.addEventListener('click', loadNewItem);
topicSelect.addEventListener('change', () => {
  const idx = topicSelect.value;
  if (idx === '') return;
  const opt = topicOptions[Number(idx)];
  if (!opt) return;
  loadSelectedTopic(opt);
});
playBtn.addEventListener('click', () => {
  if (playState === 'idle') {
    speakAll();
  } else if (playState === 'playing') {
    window.speechSynthesis.pause();
    setStatus('Đã tạm dừng');
    setPlayButton('paused');
  } else if (playState === 'paused') {
    window.speechSynthesis.resume();
    setStatus('Đang đọc...');
    setPlayButton('playing');
  }
});

// init
loadNewItem();
</script>
</body>
</html>
