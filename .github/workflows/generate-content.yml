# .github/workflows/generate-content.yml
#
# Copy file này vào đường dẫn .github/workflows/generate-content.yml
# trong repo GitHub của bạn.
#
# Chạy 1 lần/ngày (07:00 sáng giờ Việt Nam = 00:00 UTC) để sinh nội dung
# mới bằng Google Gemini API (free tier) và lưu vào Supabase. Có thể chạy tay
# bất kỳ lúc nào qua tab Actions > Run workflow (workflow_dispatch).

name: Generate daily English content

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run content generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Một số runner GitHub Actions bị lỗi kết nối khi Node ưu tiên IPv6
          # (gây "Connection error." dù mạng vẫn hoạt động). Ép dùng IPv4 trước.
          NODE_OPTIONS: "--dns-result-order=ipv4first"
        run: npm run generate
